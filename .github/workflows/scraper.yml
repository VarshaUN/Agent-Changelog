name: Agent Changelog Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Restore DB from cache
        uses: actions/cache@v4
        with:
          path: changelog.db
          key: changelog-db-${{ github.run_number }}
          restore-keys: |
            changelog-db-

      - name: Run scraper
        run: python scraper.py

      - name: Save DB back to cache
        uses: actions/cache@v4
        with:
          path: changelog.db
          key: changelog-db-${{ github.run_number }}

      - name: Upload DB as artifact (keeps 30 days of history)
        uses: actions/upload-artifact@v4
        with:
          name: changelog-db-${{ github.run_id }}
          path: changelog.db
          retention-days: 30
